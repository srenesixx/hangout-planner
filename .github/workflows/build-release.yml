name: Build and Release Hangout Planner

on:
  push:
    tags:
      - 'v*' # Memicu alur kerja ketika Anda melakukan push tag versi baru (misalnya v1.0.0)
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual dari tab Actions di GitHub

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name HangoutPlanner main.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/HangoutPlanner.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
